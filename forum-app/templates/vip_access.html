{% extends "base.html" %}
{% block title %}VIP Zugang{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <h3>⭐ VIP-Zugang</h3>
                <small class="text-muted">Gib das VIP-Passwort ein, um den exklusiven Bereich zu betreten.</small>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">VIP-Passwort</label>
                        <input type="text" name="vip_password" class="form-control"
                               placeholder="Passwort eingeben..." required autofocus>
                    </div>
                    <button type="submit" class="btn btn-hacker w-100">
                        >> VIP ZUGANG
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
